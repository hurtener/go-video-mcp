# Dockyard manifest — the control plane for this MCP server (RFC §4.2).
# Generated by 'dockyard new'. Edit freely; 'dockyard validate' checks it.
name: go-video-mcp
title: Go Video Mcp
version: 0.1.0

runtime:
  # Deployment modes this server supports. stdio is the local single-user
  # mode; add 'http' to also serve the streamable-HTTP transport.
  transports: [stdio]

tools:
  # input/output are Go type references — the contract-first source of truth
  # (P1). Their JSON Schema is generated by `dockyard generate`, never written
  # by hand. task_support: forbidden = the tool runs synchronously.
  - name: probe_media
    description: Inspect a media file with ffprobe and return typed facts.
    input: internal/contracts.ProbeMediaInput
    output: internal/contracts.ProbeMediaOutput
    task_support: forbidden
  - name: convert_video
    description: Re-encode a video to a new container, codec, size, or frame rate.
    input: internal/contracts.ConvertVideoInput
    output: internal/contracts.RenderOutput
    task_support: forbidden
  - name: trim_video
    description: Cut a [start, end) time range out of a video.
    input: internal/contracts.TrimVideoInput
    output: internal/contracts.RenderOutput
    task_support: forbidden
  - name: extract_audio
    description: Extract the audio track from a media file.
    input: internal/contracts.ExtractAudioInput
    output: internal/contracts.ExtractAudioOutput
    task_support: forbidden
  - name: list_media
    description: Browse media files under the server's allowed roots.
    input: internal/contracts.ListMediaInput
    output: internal/contracts.ListMediaOutput
    task_support: forbidden
  - name: ingest_media
    description: Persist a UI-uploaded file (base64) and return a readable path.
    input: internal/contracts.IngestMediaInput
    output: internal/contracts.IngestMediaOutput
    task_support: forbidden
  - name: create_cinematic_image_video
    description: Compile an image sequence into a cinematic slideshow video.
    input: internal/contracts.CreateCinematicImageVideoInput
    output: internal/contracts.CreateCinematicImageVideoOutput
    task_support: forbidden

# A no-template server ships no UI, so there is no apps[] block. Attach a
# Svelte UI later with 'dockyard new --template' or by adding an apps[] entry.

quality:                  # RFC §9.4 — enforced by 'dockyard validate'.
  # UI-state gates are off: this server has no UI to require states of.
  require_loading_state: false
  require_empty_state: false
  require_error_state: false
  require_permission_state: false
  # Contract hygiene gates stay on — they apply to every server.
  require_fixtures: true
  require_contract_tests: true
  require_spec_compliance: true
